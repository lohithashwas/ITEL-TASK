<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width:420px">
    <h3 class="mb-1 text-center">Create Account</h3>
    <p class="text-center text-muted mb-3" style="font-size:14px">Fill in the details below to register</p>
    <div id="msg"></div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter your username">
    </div>
    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="Enter your email">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Create a password">
    </div>
    <button id="reg-btn" class="btn btn-primary w-100">Register</button>
    <p class="mt-3 text-center" style="font-size:14px">Already have an account? <a href="login.html">Login here</a></p>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
