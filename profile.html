<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-primary px-4 d-flex justify-content-between">
    <span class="navbar-brand mb-0 h1">My Profile</span>
    <button id="logout-btn" class="btn btn-outline-light btn-sm">Logout</button>
  </nav>
  <div class="container mt-5" style="max-width:520px">
    <div id="msg"></div>
    <div class="card p-4 shadow">
      <h4 class="mb-1">Update Your Profile</h4>
      <p class="text-muted mb-4" style="font-size:14px">Your profile details are stored securely</p>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" id="fullname" class="form-control" placeholder="Enter your full name">
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Age</label>
          <input type="number" id="age" class="form-control" placeholder="Your age" min="1" max="120">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Date of Birth</label>
          <input type="date" id="dob" class="form-control">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Contact Number</label>
        <input type="tel" id="contact" class="form-control" placeholder="Enter your phone number">
      </div>
      <div class="mb-3">
        <label class="form-label">Bio</label>
        <textarea id="bio" class="form-control" rows="4" placeholder="Write something about yourself"></textarea>
      </div>
      <button id="save-btn" class="btn btn-success w-100">Save Profile</button>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
